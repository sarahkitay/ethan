<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Ethan Cope</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Oswald:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#0a0a0a',
                        charcoal: '#141414',
                        gunmetal: '#1a1a1a',
                        steel: '#2a2a2a',
                        rust: '#83B1F3',
                        amber: '#9bc2f5'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Oswald', 'sans-serif'],
                        mono: ['Space Grotesk', 'monospace'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/shared.css">
</head>
<body class="bg-void text-bone">

    <div class="noise"></div>

    <nav class="fixed top-0 left-0 right-0 z-50 px-6 md:px-12 py-6 bg-void/80 border-b border-steel backdrop-blur-sm">
        <div class="flex justify-between items-center max-w-7xl mx-auto">
            <a href="index.html" class="mono-text text-sm tracking-widest text-white font-bold">ETHAN COPE</a>
            <a href="contact.html" class="mono-text text-xs tracking-widest text-gray-400 hover:text-rust">← BACK</a>
        </div>
    </nav>

    <main class="relative z-10 min-h-screen pt-32 pb-24">
        <section class="px-6 md:px-12 lg:px-24 max-w-xl mx-auto">
            <div class="section-marker">CHECKOUT</div>
            <h1 class="display-text text-3xl md:text-4xl text-white mb-8">COMPLETE YOUR PURCHASE</h1>

            <div id="checkout-summary" class="bg-charcoal border border-steel p-6 mb-10">
                <p class="mono-text text-xs text-gray-500 mb-1">SELECTED PROGRAM</p>
                <p id="checkout-program-name" class="display-text text-xl text-white"></p>
            </div>

            <form id="checkout-form" class="space-y-6">
                <div>
                    <label class="mono-text text-xs tracking-widest text-gray-500 mb-2 block">FULL NAME</label>
                    <input type="text" id="checkout-name" class="dark-input bg-gunmetal border border-steel py-3 px-4 w-full" placeholder="Your name" required>
                </div>
                <div>
                    <label class="mono-text text-xs tracking-widest text-gray-500 mb-2 block">EMAIL</label>
                    <input type="email" id="checkout-email" class="dark-input bg-gunmetal border border-steel py-3 px-4 w-full" placeholder="you@example.com" required>
                </div>
                <div>
                    <label class="mono-text text-xs tracking-widest text-gray-500 mb-2 block">CREATE PASSWORD (for client portal access)</label>
                    <input type="password" id="checkout-password" class="dark-input bg-gunmetal border border-steel py-3 px-4 w-full" placeholder="Min 6 characters" required minlength="6">
                </div>
                <div class="border-t border-steel pt-6">
                    <p class="mono-text text-xs text-gray-500 mb-4">Payment integration coming soon. Click below to complete; you’ll get instant client portal access.</p>
                    <button type="submit" class="magnetic-btn w-full" data-magnetic><span>COMPLETE PAYMENT</span></button>
                </div>
            </form>
        </section>
    </main>

    <script src="js/shared.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
