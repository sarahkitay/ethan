<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Videos | Ethan Cope</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Oswald:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#0a0a0a',
                        charcoal: '#141414',
                        gunmetal: '#1a1a1a',
                        steel: '#2a2a2a',
                        rust: '#83B1F3',
                        amber: '#9bc2f5'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Oswald', 'sans-serif'],
                        mono: ['Space Grotesk', 'monospace'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/shared.css">
</head>
<body class="bg-void text-bone">

    <div class="noise"></div>

    <!-- Nav -->
    <nav class="fixed top-0 left-0 right-0 z-50 px-6 md:px-12 py-6 bg-void/80 border-b border-steel backdrop-blur-sm">
        <div class="flex justify-between items-center max-w-7xl mx-auto">
            <a href="index.html" class="mono-text text-sm tracking-widest text-white font-bold">ETHAN COPE</a>
            <div class="hidden md:flex gap-8 mono-text text-xs tracking-widest text-gray-400">
                <a href="programs.html" class="hover:text-rust transition-colors">PROGRAMS</a>
                <a href="results.html" class="hover:text-rust transition-colors">RESULTS</a>
                <a href="nutrition.html" class="hover:text-rust transition-colors">NUTRITION</a>
                <a href="workout-library.html" class="text-rust">WORKOUTS</a>
                <a href="contact.html" class="hover:text-rust transition-colors">CONTACT</a>
                <a href="client-portal.html" class="hover:text-rust transition-colors">CLIENT PORTAL</a>
                <a href="admin-portal.html" class="hover:text-rust transition-colors">ADMIN</a>
            </div>
            <button class="md:hidden text-white p-2 -mr-2" id="mobile-menu-btn" aria-label="Open menu">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
        </div>
        <div id="mobile-nav-panel" class="hidden md:hidden absolute top-full left-0 right-0 bg-void border-b border-steel py-4 px-6">
            <div class="flex flex-col gap-3 mono-text text-xs tracking-widest text-gray-400 max-w-7xl mx-auto">
                <a href="programs.html" class="hover:text-rust transition-colors py-1">PROGRAMS</a>
                <a href="results.html" class="hover:text-rust transition-colors py-1">RESULTS</a>
                <a href="nutrition.html" class="hover:text-rust transition-colors py-1">NUTRITION</a>
                <a href="workout-library.html" class="text-rust py-1">WORKOUTS</a>
                <a href="contact.html" class="hover:text-rust transition-colors py-1">CONTACT</a>
                <a href="client-portal.html" class="hover:text-rust transition-colors py-1">CLIENT PORTAL</a>
                <a href="admin-portal.html" class="hover:text-rust transition-colors py-1">ADMIN</a>
            </div>
        </div>
    </nav>

    <main class="relative z-10 min-h-screen">
        <!-- Video library only -->
        <section class="px-6 md:px-12 lg:px-24 pb-24 pt-32">
            <div class="max-w-7xl mx-auto">
                <div class="section-marker mb-4">WORKOUTS</div>
                <h1 class="display-text text-4xl md:text-6xl text-white mb-2">
                    VIDEO LIBRARY
                </h1>
                <p class="mono-text text-sm text-gray-500 max-w-xl mb-10">
                    Form and technique for main workouts and movement patterns. New videos added regularly.
                </p>
                <div id="workout-video-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Filled by workout-library-videos.js from admin-uploaded videos -->
                </div>
            </div>
        </section>
    </main>

    <!-- Full video modal: sound + controls -->
    <div id="workout-video-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-void/95 p-4">
        <button type="button" id="workout-video-modal-close" class="absolute top-4 right-4 z-10 w-10 h-10 flex items-center justify-center rounded-full bg-charcoal border border-steel text-white hover:bg-rust transition-colors mono-text text-xs" aria-label="Close">×</button>
        <video id="workout-video-modal-video" class="max-w-full max-h-full w-full h-auto" controls playsinline></video>
    </div>

    <footer class="bg-charcoal border-t border-steel py-8 px-6 text-center mono-text text-xs text-gray-600 tracking-widest">
        <a href="index.html" class="hover:text-rust transition-colors">ETHAN COPE</a> · WORKOUTS
    </footer>

    <script src="js/shared.js"></script>
    <script src="js/workout-videos-db.js"></script>
    <script src="js/workout-library-videos.js"></script>
</body>
</html>
